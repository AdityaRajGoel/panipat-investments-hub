# Mirrors the caching + security headers from vercel.json for self-hosted runs.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip text assets (nginx:alpine has gzip built in; brotli needs a module)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # security headers (parity with vercel.json)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=()" always;

    # hashed build assets: cache forever
    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # sitemaps / robots / manifest: 1 day
    location ~* \.(xml|txt|webmanifest)$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # media: 30 days
    location ~* \.(webp|avif|jpg|jpeg|png|gif|ico|svg|mp4|woff2?)$ {
        add_header Cache-Control "public, max-age=2592000";
        try_files $uri =404;
    }

    # SPA fallback — serve the prerendered page if it exists, else index.html
    location / {
        try_files $uri $uri.html /index.html;
    }
}
