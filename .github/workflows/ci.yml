# Catches broken builds BEFORE Vercel deploys them.
# Hard gates: typecheck, tests, production build.
# Lint reports but does not block (101 pre-existing issues to burn down).
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Tests
        run: npm test
      - name: Build (vite only, no prerender)
        run: npx vite build
      - name: Lint
        run: npx eslint . --max-warnings=0

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci --no-audit --no-fund
      - run: npx vite build
      - run: npx playwright install chromium --with-deps
      - name: E2E smoke tests
        run: npx playwright test

  docker:
    runs-on: ubuntu-latest
    # Only prove the container still builds when its inputs change.
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t sphpnp-web .
