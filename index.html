<!DOCTYPE html>
<html lang="en-IN">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="content-language" content="en-IN" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0A192F" />
  <link rel="icon" type="image/png" href="https://www.sphpnp.com/logo.png" />
  <link rel="apple-touch-icon" href="https://www.sphpnp.com/logo.png" />
  <!-- Google Fonts: preconnect for speed, then non-blocking stylesheet -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="preconnect" href="https://zbkjbbujsdlpujotgltm.supabase.co" crossorigin />
  <meta http-equiv="X-Content-Type-Options" content="nosniff" />
  <meta http-equiv="X-XSS-Protection" content="1; mode=block" />
  <meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin" />
  <meta http-equiv="Permissions-Policy" content="camera=(), microphone=(), geolocation=(self)" />
  <!-- Preload hero poster for fastest LCP -->
  <link rel="preload" href="/hero-bg.jpg" as="image" fetchpriority="high" />
  <link rel="preload" href="/video.mp4" as="video" type="video/mp4" />
  <!-- Font loading -->
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'" />
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&family=Open+Sans:wght@400;500;600&display=swap" />
  </noscript>
  <!-- Critical inline CSS to avoid render-blocking -->
  <style>
    :root {
      --background: 210 50% 98%;
      --foreground: 213 70% 15%;
      --card: 0 0% 100%;
      --brand-charcoal: 220 15% 20%
    }

    .dark {
      --background: 220 60% 6%;
      --foreground: 210 40% 96%;
      --card: 220 55% 10%;
      --brand-charcoal: 220 50% 8%
    }

    body {
      margin: 0;
      font-family: 'Open Sans', system-ui, -apple-system, sans-serif;
      background: hsl(var(--background));
      color: hsl(var(--foreground))
    }

    #root {
      min-height: 100vh
    }
  </style>
  <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

  <!-- Geo & language targeting -->
  <link rel="alternate" hreflang="en-IN" href="https://www.sphpnp.com/" />
  <link rel="alternate" hreflang="x-default" href="https://www.sphpnp.com/" />
  <meta name="geo.region" content="IN-HR" />
  <meta name="geo.placename" content="Panipat" />
  <meta name="geo.position" content="29.3909;76.9635" />
  <meta name="ICBM" content="29.3909, 76.9635" />

  <!-- Bing Webmaster verification -->
  <meta name="msvalidate.01" content="87203ED3921993C83F2A456716D1ABAF" />
  <link rel="sitemap" type="application/xml" title="Sitemap" href="https://www.sphpnp.com/sitemap.xml" />
</head>

<body>
  <div id="root">
  </div>

  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
