  <!-- Instant splash: masks the prerender->client-render flash until React mounts.
       Inline + static so it paints on first frame; main.tsx fades it out. -->
  <div id="app-splash" aria-hidden="true">
    <div class="splash-inner">
      <div class="splash-logo">
        <div class="splash-ring"></div>
        <div class="splash-bars">
          <span class="up"></span><span class="dn"></span><span class="up"></span><span class="up"></span><span class="dn"></span>

  <style>
    #app-splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:radial-gradient(120% 90% at 50% 0%,#12294a 0%,#0A192F 60%,#07132a 100%);transition:opacity .5s ease}
    #app-splash.hide{opacity:0;pointer-events:none}
    .splash-inner{display:flex;flex-direction:column;align-items:center;gap:16px;animation:splashIn .5s ease both}
    @keyframes splashIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    .splash-logo{position:relative;width:96px;height:96px;display:flex;align-items:center;justify-content:center}
    .splash-ring{position:absolute;inset:0;border-radius:50%;padding:2px;background:conic-gradient(from 0deg,#22c55e,#eab308,#22c55e00 70%);-webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 0);mask:radial-gradient(farthest-side,transparent calc(100% - 3px),#000 0);animation:splashSpin 1.1s linear infinite}
    @keyframes splashSpin{to{transform:rotate(360deg)}}
    .splash-bars{display:flex;align-items:flex-end;gap:5px;height:44px}
    .splash-bars span{width:6px;border-radius:2px;animation:splashbar 1.05s ease-in-out infinite}
    .splash-bars .up{background:linear-gradient(#34d399,#059669)}
    .splash-bars .dn{background:linear-gradient(#f87171,#dc2626)}
    .splash-bars span:nth-child(2){animation-delay:.1s}
    .splash-bars span:nth-child(3){animation-delay:.2s}
    .splash-bars span:nth-child(4){animation-delay:.3s}
    .splash-bars span:nth-child(5){animation-delay:.4s}
    @keyframes splashbar{0%,100%{height:12px}50%{height:40px}}
    .splash-brand{font-family:'Montserrat',system-ui,sans-serif;color:#fff;font-weight:700;letter-spacing:.6px;font-size:19px}
    .splash-track{width:150px;height:3px;border-radius:99px;background:rgba(255,255,255,.12);overflow:hidden}
    .splash-fill{height:100%;width:40%;border-radius:99px;background:linear-gradient(90deg,#22c55e,#eab308);animation:splashSweep 1.3s cubic-bezier(.4,0,.2,1) infinite}
    @keyframes splashSweep{0%{transform:translateX(-120%)}100%{transform:translateX(400%)}}
    .splash-sub{font-family:'Open Sans',system-ui,sans-serif;color:#93a5c0;font-size:12px;letter-spacing:.3px}
    @media(prefers-reduced-motion:reduce){.splash-ring,.splash-bars span,.splash-fill{animation:none}.splash-bars span{height:28px}.splash-fill{width:100%}}
  </style>
